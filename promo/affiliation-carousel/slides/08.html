<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Slide 8 — CTA</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .slide {
    background: var(--ink);
    color: var(--paper);
  }
  .brand-name, .eyebrow {
    color: var(--paper) !important;
  }
  .brand span {
    color: var(--paper);
    opacity: 0.7;
  }
  .cta-eyebrow {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 36px;
  }
  .cta-title {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 700;
    font-size: 110px;
    line-height: 0.95;
    letter-spacing: -2.5px;
    color: var(--paper);
  }
  .cta-title .accent {
    color: var(--gold);
  }
  .cta-sub {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 32px;
    color: var(--paper);
    opacity: 0.8;
    margin-top: 40px;
    line-height: 1.35;
  }
  .cta-action {
    margin-top: 80px;
    padding: 32px 48px;
    background: var(--paper);
    color: var(--ink);
    border-radius: 12px;
    display: inline-flex;
    align-items: center;
    gap: 24px;
    align-self: flex-start;
  }
  .cta-action-label {
    font-family: 'Inter', sans-serif;
    font-size: 26px;
    font-weight: 600;
  }
  .cta-action-arrow {
    font-size: 32px;
    color: var(--teal);
  }
  .footer-dark {
    margin-top: auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 14px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--paper);
    opacity: 0.6;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="brand">
    <span class="brand-name">Roadbook.ai</span>
    <span>08 / 08</span>
  </div>

  <div style="margin-top: 80px;">
    <div class="cta-eyebrow">Active ton programme</div>
    <h1 class="cta-title">
      Ton réseau<br>
      vaut <span class="accent">de l'argent</span>.
    </h1>
    <p class="cta-sub">
      Active ton code maintenant.<br>
      Ça prend 1 clic.
    </p>

    <div class="cta-action">
      <span class="cta-action-label">getroadbook.com/affiliate</span>
      <span class="cta-action-arrow">→</span>
    </div>
  </div>

  <div class="footer-dark">
    <span>Roadbook.ai — pour les travel designers qui livrent autrement</span>
    <span>Lien en bio</span>
  </div>
</div>
</body>
</html>
