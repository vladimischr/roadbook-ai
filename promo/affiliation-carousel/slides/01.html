<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Slide 1 — Cover</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .cover-eyebrow {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    color: var(--teal);
    margin-top: 140px;
  }
  .cover-title {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 700;
    font-size: 104px;
    line-height: 0.92;
    letter-spacing: -2.5px;
    margin-top: 48px;
  }
  .cover-title .accent {
    color: var(--teal);
  }
  .cover-sub {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 30px;
    color: var(--muted);
    margin-top: 40px;
    line-height: 1.3;
  }
</style>
</head>
<body>
<div class="slide">
  <div class="brand">
    <span class="brand-name">Roadbook.ai</span>
    <span>Programme d'affiliation</span>
  </div>

  <div class="cover-eyebrow">Pour les travel designers</div>
  <h1 class="cover-title">
    Touche <span class="accent">1 044 €</span><br>
    en parlant<br>
    d'un outil que tu<br>
    utilises déjà.
  </h1>
  <p class="cover-sub">Comment ça marche, en 7 slides.</p>

  <div class="footer">
    <span>roadbook.ai · 01 / 08</span>
    <span class="swipe-hint">Glisse →</span>
  </div>
</div>
</body>
</html>
